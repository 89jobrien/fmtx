project: fmtx
updated: 2026-04-13

notes: >
  File extension to formatter dispatcher. Reads ~/.config/fmtx/config.toml, maps
  extensions to formatter commands (rustfmt, shellcheck, prettier via bunx, black via
  uvx, taplo). Supports --check flag. Used as a single PostToolUse hook in
  ~/.claude/settings.json replacing three inline shell conditionals.

items:
