project: fmtx
updated: 2026-04-13

notes: >
  File extension to formatter dispatcher. Reads config via FMTX_CONFIG env var or
  platform config dir (~/.config/fmtx/config.toml on Linux,
  ~/Library/Application Support/fmtx/config.toml on macOS). Supports single and
  multi-command per extension, format_args (format-only flags), check_args (check-only
  flags). Used as PostToolUse hook in ~/.claude/settings.json. User is on nushell —
  .nu support pending nufmt publication.

items:
  - id: fmtx-1
    title: Add multi-command support per extension
    priority: P2
    status: done
    completed: 2026-04-13
    description: >
      Currently one command per extension. Some extensions need both a formatter and a
      linter (e.g. rs needs rustfmt + rascal check). Options: fmtrs wrapper script
      (current workaround), or native commands = [...] array in config.
    files:
      - src/config.rs
      - src/main.rs

  - id: fmtx-2
    title: Wire rascal check for .rs files
    priority: P2
    status: open
    description: >
      Once rascal's embedder (issue #1) is live, add rascal check as a second step
      for .rs files alongside rustfmt. Either via fmtrs wrapper or fmtx-1 multi-command.
    files:
      - ~/.config/fmtx/config.toml

  - id: fmtx-3
    title: Add .nu (nushell) formatter support
    priority: P2
    status: blocked
    description: >
      nufmt is not published on crates.io yet. Commented-out stub already in config.
      Unblock by installing nufmt once published (or via cargo install from git).
      Then enable: [extensions.nu] command = "nufmt", check_args = ["--check"].
    files:
      - ~/.config/fmtx/config.toml
    extra:
      - type: blocker
        note: nufmt not yet on crates.io — track https://github.com/nushell/nufmt

  - id: fmtx-4
    title: Add --config CLI flag for explicit config path
    priority: P2
    status: open
    description: >
      Currently FMTX_CONFIG env var overrides config path (added for test isolation).
      A --config <path> CLI flag would be cleaner for scripted use and CI environments
      without needing to set env vars. Also needed to truly decouple integration tests
      from the live dotfile.
    files:
      - src/main.rs
      - src/config.rs

