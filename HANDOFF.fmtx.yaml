    priority: P2
    status: done
    completed: 2026-04-13
    description: >
      Currently one command per extension. Some extensions need both a formatter and a
      linter (e.g. rs needs rustfmt + rascal check). Options: fmtrs wrapper script
      (current workaround), or native commands = [...] array in config.
    files:
      - src/config.rs
      - src/main.rs

  - id: fmtx-2
